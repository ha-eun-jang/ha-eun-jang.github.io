<div class="author">
  <img
    class="author-avatar"
    src="{{ site.author.avatar }}"
    alt="{{ site.author.username }}"
  />
  <h2 class="author-name">{{ site.author.name }}</h2>

  <p class="author-meta">
    <strong>{{ site.author.position }}</strong><br>
    <a href="mailto:{{ site.author.email }}">
      j.haeun [at] yonsei [dot] ac [dot] kr
    </a>
  </p>

  <div class="author-bio">
  {{ site.author.bio | markdownify }}
</div>
</div>
